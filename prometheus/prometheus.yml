global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules (will be added in a future commit)
rule_files:
  - "alerts/*.yml"

scrape_configs:

  # Prometheus monitors itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Host metrics via Node Exporter
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]